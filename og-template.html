<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { width: 1200px; height: 630px; overflow: hidden; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }

.og-card {
  width: 1200px; height: 630px; display: flex; flex-direction: column; justify-content: center;
  padding: 60px 80px; position: relative; overflow: hidden;
}

/* Theme: Dark Gradient (default) */
.theme-dark { background: linear-gradient(135deg, #0f0f1a 0%, #1a0a2e 50%, #0a1628 100%); color: #fff; }
.theme-dark .og-title { color: #fff; }
.theme-dark .og-desc { color: rgba(255,255,255,0.7); }
.theme-dark .og-footer { color: rgba(255,255,255,0.4); }
.theme-dark .accent-line { background: linear-gradient(90deg, #a78bfa, #f472b6); }

/* Theme: Light */
.theme-light { background: #ffffff; color: #111; }
.theme-light .og-title { color: #111; }
.theme-light .og-desc { color: #555; }
.theme-light .og-footer { color: #999; }
.theme-light .accent-line { background: linear-gradient(90deg, #7c3aed, #ec4899); }

/* Theme: Sunset */
.theme-sunset { background: linear-gradient(135deg, #f97316 0%, #ec4899 50%, #8b5cf6 100%); color: #fff; }
.theme-sunset .og-title { color: #fff; text-shadow: 0 2px 20px rgba(0,0,0,0.3); }
.theme-sunset .og-desc { color: rgba(255,255,255,0.9); }
.theme-sunset .og-footer { color: rgba(255,255,255,0.6); }
.theme-sunset .accent-line { background: rgba(255,255,255,0.4); }

/* Theme: Ocean */
.theme-ocean { background: linear-gradient(135deg, #0c4a6e 0%, #164e63 50%, #1e3a5f 100%); color: #fff; }
.theme-ocean .og-title { color: #7dd3fc; }
.theme-ocean .og-desc { color: rgba(255,255,255,0.7); }
.theme-ocean .og-footer { color: rgba(255,255,255,0.4); }
.theme-ocean .accent-line { background: linear-gradient(90deg, #38bdf8, #22d3ee); }

/* Theme: Forest */
.theme-forest { background: linear-gradient(135deg, #14532d 0%, #1a2e05 100%); color: #fff; }
.theme-forest .og-title { color: #86efac; }
.theme-forest .og-desc { color: rgba(255,255,255,0.7); }
.theme-forest .og-footer { color: rgba(255,255,255,0.4); }
.theme-forest .accent-line { background: linear-gradient(90deg, #4ade80, #22c55e); }

.accent-line { width: 80px; height: 4px; border-radius: 2px; margin-bottom: 30px; }

.og-emoji { font-size: 64px; margin-bottom: 20px; }

.og-title {
  font-size: 56px; font-weight: 800; line-height: 1.15;
  letter-spacing: -1.5px; margin-bottom: 20px;
  max-height: 200px; overflow: hidden;
}

.og-desc {
  font-size: 24px; line-height: 1.4;
  max-height: 100px; overflow: hidden;
}

.og-footer {
  position: absolute; bottom: 40px; left: 80px; right: 80px;
  display: flex; justify-content: space-between; align-items: center;
  font-size: 18px;
}

.og-logo { display: flex; align-items: center; gap: 10px; font-weight: 600; }

/* Decorative elements */
.decor-circle {
  position: absolute; border-radius: 50%; opacity: 0.08;
}
.theme-dark .decor-circle { background: #a78bfa; }
.theme-light .decor-circle { background: #7c3aed; }
.theme-sunset .decor-circle { background: #fff; }
.theme-ocean .decor-circle { background: #38bdf8; }
.theme-forest .decor-circle { background: #4ade80; }
</style>
</head>
<body>
<div class="og-card {{THEME_CLASS}}">
  <div class="decor-circle" style="width:400px;height:400px;top:-100px;right:-100px;"></div>
  <div class="decor-circle" style="width:200px;height:200px;bottom:-50px;left:-50px;"></div>
  
  <div class="accent-line"></div>
  {{EMOJI_HTML}}
  <div class="og-title">{{TITLE}}</div>
  <div class="og-desc">{{DESCRIPTION}}</div>
  
  <div class="og-footer">
    <div class="og-logo">{{AUTHOR}}</div>
    <div>{{DOMAIN}}</div>
  </div>
</div>
</body>
</html>
